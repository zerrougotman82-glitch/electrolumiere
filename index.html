<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARL ELECTROLUMIERE — L'Excellence Électrique depuis 1987</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #080C14;
            --dark2: #0D1420;
            --dark3: #111B2E;
            --gold: #3B9EE8; /* Bleu Électrique Premium */
            --gold2: #7FC4F5;
            --gold-dim: rgba(59,158,232,0.15);
            --cream: #EFF4FA;
            --muted: #7A8FA8;
            --border: rgba(59,158,232,0.22);
            --white: #ffffff;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--dark);
            color: var(--cream);
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- UTILS --- */
        .section-label { font-size:.68rem; letter-spacing:.35em; text-transform:uppercase; color:var(--gold); margin-bottom:1rem; display:block; }
        
        /* --- NAV --- */
        nav {
            position: fixed; top:0; left:0; right:0; z-index:200;
            display: flex; align-items:center; justify-content:space-between;
            padding: 1.2rem 5rem;
            background: rgba(13,15,20,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem; font-weight: 600; letter-spacing:.1em;
            color: var(--cream); text-decoration:none;
            display:flex; align-items:center; gap:.8rem;
        }
        .nav-logo-bolt {
            width: 28px; height: 28px; background: var(--gold);
            clip-path: polygon(60% 0%, 100% 0%, 40% 50%, 80% 50%, 0% 100%, 20% 55%, -10% 55%);
        }
        .nav-logo span { color: var(--gold); }
        .nav-links { display:flex; gap:2.5rem; list-style:none; }
        .nav-links a { font-size:.73rem; letter-spacing:.2em; text-transform:uppercase; color: var(--muted); text-decoration:none; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        /* --- HERO --- */
        .hero {
            min-height: 100vh; display: flex; flex-direction:column; justify-content:center;
            padding: 8rem 5rem 5rem; position: relative;
        }
        .hero-content { position:relative; z-index:1; max-width: 780px; }
        .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 6vw, 5.5rem); font-weight: 300; line-height: 1.05; margin-bottom: 1.8rem; }
        .hero-title em { font-style:italic; color:var(--gold); }
        .hero-stats { display:flex; gap:0; border-top: 1px solid var(--border); padding-top: 2.5rem; margin-top: 3rem; }
        .stat { flex:1; padding-right:2.5rem; margin-right:2.5rem; border-right: 1px solid var(--border); }
        .stat:last-child { border:none; }
        .stat-num { font-family:'Cormorant Garamond',serif; font-size:3.2rem; font-weight:300; color:var(--gold); text-shadow: 0 0 20px rgba(59,158,232,0.3); }
        .stat-label { font-size:.68rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }

        /* --- HISTOIRE --- */
        .histoire { background: var(--dark2); padding: 7rem 5rem; }
        .histoire-inner { display:grid; grid-template-columns:1fr 1.2fr; gap:6rem; }
        .generations { display:flex; flex-direction:column; gap:0; }
        .gen-item { padding: 2.5rem 0; border-bottom: 1px solid var(--border); display:grid; grid-template-columns:auto 1fr; gap:2rem; }
        .gen-num { font-family:'Cormorant Garamond',serif; font-size:3rem; color:var(--border); line-height:1; }
        .gen-name { font-family:'Cormorant Garamond',serif; font-size:1.6rem; color: var(--cream); }
        .gen-name strong { font-weight: 600; color: var(--white); }
        .gen-tag { font-size:.65rem; letter-spacing:.25em; text-transform:uppercase; color:var(--gold); margin-bottom:.5rem; }
        .gen-desc { font-size:.88rem; line-height:1.8; color:var(--muted); }
        .gen-innovation { border-left: 3px solid var(--gold); padding-left: 30px !important; background: rgba(59, 158, 232, 0.04); border-bottom: none !important; }

        /* --- EXPERTISES --- */
        .expertises { background: var(--dark); padding: 7rem 5rem; }
        .services-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background: var(--border); border: 1px solid var(--border); }
        .service-card { background:var(--dark); padding:3rem; transition: background .4s; }
        .service-card:hover { background: var(--dark3); }
        .service-name { font-family:'Cormorant Garamond',serif; font-size:1.4rem; margin-bottom:1rem; }
        .service-detail { font-size:.75rem; color:var(--gold); margin-top:1.5rem; letter-spacing:.1em; font-weight:600; text-transform:uppercase; }

        /* --- CONTACT --- */
        .contact-form input, .contact-form textarea {
            background:transparent; border:none; border-bottom:1px solid var(--border); 
            padding:1rem 0; color:var(--white); outline:none; font-family:'Jost'; width: 100%; margin-bottom: 1.5rem;
        }

        @media (max-width:900px) {
            nav { padding: 1rem 2rem; }
            .histoire-inner { grid-template-columns: 1fr; }
            .hero, .expertises, .histoire, .references, .qualite { padding: 5rem 2rem; }
            .services-grid { grid-template-columns: 1fr; }
            .hero-stats { flex-wrap: wrap; }
            .stat { border: none; flex: 0 0 100%; margin-bottom: 1.5rem; }
        }
    </style>
</head>

            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
